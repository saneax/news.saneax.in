services:
  # ── News Portal (React + nginx) ──────────────────
  news-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:4080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Cloudflare Tunnel ─────────────────────────────
  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: news-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiODNiYjUwODQwYjZhYmEyYzE4ODQ4ZjQ1NWI5NGY1OTMiLCJ0IjoiNDM2NDM2MzgtNTM2NC00ZmZkLTk1NmMtNDcxZjI3MGM1NTg0IiwicyI6Ik1XRm1abUkzT0RRdFpERTNNUzAwTXpjd0xXSmhOemN0TldSbVpqaGhZekV6WTJGaCJ9
    environment:
      - CF_TUNNEL_TOKEN=eyJhIjoiODNiYjUwODQwYjZhYmEyYzE4ODQ4ZjQ1NWI5NGY1OTMiLCJ0IjoiNDM2NDM2MzgtNTM2NC00ZmZkLTk1NmMtNDcxZjI3MGM1NTg0IiwicyI6Ik1XRm1abUkzT0RRdFpERTNNUzAwTXpjd0xXSmhOemN0TldSbVpqaGhZekV6WTJGaCJ9
    network_mode: host
    depends_on:
      - news-portal
