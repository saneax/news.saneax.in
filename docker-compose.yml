services:
  # ── News Portal (React + nginx) ──────────────────
  news-portal:
    build:
      context: ./news-portal
      dockerfile: Dockerfile
    container_name: news-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:4080:80"
    networks:
      - news-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  news-net:
    driver: bridge
